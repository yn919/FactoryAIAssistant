name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles("**/requirements.txt") }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r factory-hmi-api/requirements.txt
        pip install flake8 black isort safety
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 factory-hmi-api/ --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 factory-hmi-api/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Format code with black
      run: |
        black factory-hmi-api/
    
    - name: Sort imports with isort
      run: |
        isort factory-hmi-api/
    
    - name: Run security scan with safety
      run: |
        safety check -r factory-hmi-api/requirements.txt
    
    - name: Run tests with coverage
      run: |
        cd factory-hmi-api
        pytest test_main.py -v --cov=app --cov-report=xml --cov-report=html --cov-report=term-missing --cov-fail-under=70
    
    - name: Generate coverage badge
      run: |
        cd factory-hmi-api
        # カバレッジ率を取得して環境変数に保存
        COVERAGE=$(python -c "import xml.etree.ElementTree as ET; tree = ET.parse(\'coverage.xml\'); root = tree.getroot(); print(float(root.attrib[\'line-rate\']) * 100)")
        echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV
        echo "Current coverage: $COVERAGE%"
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: factory-hmi-api/coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}
    
    - name: Upload coverage artifacts
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          factory-hmi-api/coverage.xml
          factory-hmi-api/htmlcov/
        retention-days: 30

  unity-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Unity-${{ matrix.unity-version }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Unity-${{ matrix.unity-version }}-
            Unity-

      - uses: game-ci/unity-test-runner@v4
        id: testRunner
        with:
          projectPath: FactoryAIAssistant
          unityVersion: 2023.2.19f1
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          testMode: PlayMode
          artifactsPath: FactoryAIAssistant/artifacts
          coveragePath: FactoryAIAssistant/coverage

      - uses: actions/upload-artifact@v4
        with:
          name: Test Results (Unity PlayMode)
          path: FactoryAIAssistant/artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: Coverage Results (Unity PlayMode)
          path: FactoryAIAssistant/coverage
