name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  python-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.13]

    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort safety pytest

      - name: Lint with flake8
        run: |
          flake8 factory-hmi-api/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 factory-hmi-api/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Format code with black
        run: black factory-hmi-api/

      - name: Sort imports with isort
        run: isort factory-hmi-api/

      - name: Run security scan with safety
        run: safety check

      - name: Run tests
        run: |
          cd factory-hmi-api
          pytest -v

  unity-test:
    runs-on: ubuntu-latest
    env:
      UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/cache@v3
        with:
          path: Library
          key: Unity-6000.4.5f1-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Unity-6000.4.5f1-
            Unity-

      - uses: game-ci/unity-test-runner@v4
        id: testRunner
        with:
          projectPath: FactoryAIAssistant
          unityVersion: 6000.4.5f1
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          testMode: EditMode
          artifactsPath: FactoryAIAssistant/artifacts

      - uses: actions/upload-artifact@v4
        with:
          name: Test Results (Unity EditMode)
          path: FactoryAIAssistant/artifacts
